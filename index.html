<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Alex+Brush&display=swap" rel="stylesheet">
    <title>Mandala Skincare</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="img/logo-mandala.png" alt="Mandala Belleza Integral" height="80">
                <span class="ms-2 logo-text">MANDALA</span>
            </a>

            <button class="btn-carrito" type="button" data-bs-toggle="offcanvas" data-bs-target="#carritoOffcanvas">
                🛒 <span class="badge-carrito" id="contadorCarrito">0</span>
            </button>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Productos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
                </ul>
            </div>

        </div>
    </nav>

    <header>

        <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">

            <div class="carousel-inner">

                <!-- Slide 1 -->
                <div class="carousel-item active">
                    <img src="img/banner1.png" class="d-block w-100">
                    <div class="carousel-caption">
                        <h1>
                            <span class="titulo-bold">Productos pensados</span>
                            <span class="titulo-script">para tú piel</span>
                        </h1>
                    </div>
                </div>

                <!-- Slide 2 -->
                <div class="carousel-item">
                    <img src="img/banner2.png" class="d-block w-100">
                    <div class="carousel-caption">
                        <h1>
                            <span class="titulo-bold">Ingredientes específicos</span>
                            <span class="titulo-script">Lo que tu piel necesita</span>
                        </h1>
                    </div>
                </div>

                <!-- Slide 3 -->
                <div class="carousel-item">
                    <img src="img/banner3.jpg" class="d-block w-100">
                    <div class="carousel-caption">
                        <h1>
                            <span class="titulo-bold">Asesoramiento </span>
                            <span class="titulo-script"> Profesional</span>
                        </h1>
                    </div>
                </div>

            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>

            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>

        </div>

    </header>

    <!-- Medios de pago (se llenan solos desde la hoja "Config") -->
    <section class="container text-center mt-4" id="medios-pago"></section>

    <section class="container mt-4">

        <div class="row">

            <div class="col-md-8">
                <input
                    type="text"
                    class="form-control"
                    placeholder="Buscar productos...">
            </div>

            <div class="col-md-4">
                <select class="form-select">
                    <option>Todas las categorías</option>
                </select>
            </div>

        </div>

    </section>

    <section class="container py-5">

        <h2 class="text-center mb-5">
            Nuestros Productos
        </h2>

        <!-- Spinner mientras se cargan los productos desde la base de datos -->
        <div id="cargando-productos" class="text-center py-5">
            <div class="spinner-border" role="status"></div>
            <p class="mt-2">Cargando productos...</p>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4" id="contenedor-productos">
            <!-- Las cards de productos se generan automáticamente con JS -->
        </div>

        <!-- Paginación -->
        <nav class="d-flex justify-content-center mt-4">
            <ul class="pagination" id="paginacion"></ul>
        </nav>

    </section>

    <!-- Panel del carrito -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="carritoOffcanvas">
        <div class="offcanvas-header">
            <h5>Tu Carrito</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <ul id="listaCarrito" class="list-unstyled flex-grow-1"></ul>
            <hr>
            <h5>Total: <span id="totalCarrito">$0</span></h5>
            <button class="btn-mandala w-100 mt-2" id="btnWhatsapp">
                Finalizar pedido por WhatsApp
            </button>
        </div>
    </div>

    <!-- Toast de confirmación -->
    <div class="toast-confirmacion" id="toastConfirmacion">
        ✓ Producto agregado al carrito
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>

</body>
</html>
