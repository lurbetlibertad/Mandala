<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Alex+Brush&display=swap" rel="stylesheet">
    <title>Mandala Skincare</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="img/logo-mandala.png" alt="Mandala Belleza Integral" height="80">
                <span class="ms-2 logo-text">MANDALA</span>
            </a>

            <button class="btn-carrito" type="button" data-bs-toggle="offcanvas" data-bs-target="#carritoOffcanvas">
                🛒 <span class="badge-carrito" id="contadorCarrito">0</span>
            </button>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link active" href="productos.html">Productos</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
                    <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
                </ul>
            </div>

        </div>
    </nav>

    <header class="py-4 bg-light text-center">
        <h1 class="titulo-bold" style="font-size: 2rem;">Nuestros Productos</h1>
    </header>

    <!-- Medios de pago (se llenan solos desde la hoja "Config") -->
    <section class="container text-center mt-4" id="medios-pago"></section>

    <section class="container mt-4">

        <div class="row g-2">

            <div class="col-md-5">
                <input
                    type="text"
                    class="form-control"
                    placeholder="Buscar productos...">
            </div>

            <div class="col-md-3">
                <select class="form-select" id="filtroCategoria">
                    <option>Todas las categorías</option>
                </select>
            </div>

            <div class="col-md-2">
                <select class="form-select" id="filtroMarca">
                    <option>Todas las marcas</option>
                </select>
            </div>

            <div class="col-md-2">
                <select class="form-select" id="ordenPrecio">
                    <option value="relevancia">Ordenar por</option>
                    <option value="menor">Precio: menor a mayor</option>
                    <option value="mayor">Precio: mayor a menor</option>
                </select>
            </div>

        </div>

        <!-- Aviso de envío gratis -->
        <div class="text-center mt-3" id="aviso-envio-gratis"></div>

    </section>

    <section class="container py-5">

        <!-- Spinner mientras se cargan los productos desde la base de datos -->
        <div id="cargando-productos" class="text-center py-5">
            <div class="spinner-border" role="status"></div>
            <p class="mt-2">Cargando productos...</p>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4" id="contenedor-productos">
            <!-- Las cards de productos se generan automáticamente con JS -->
        </div>

        <!-- Paginación -->
        <nav class="d-flex justify-content-center mt-4">
            <ul class="pagination" id="paginacion"></ul>
        </nav>

    </section>

    <!-- Panel del carrito -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="carritoOffcanvas">
        <div class="offcanvas-header">
            <h5>Tu Carrito</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <ul id="listaCarrito" class="list-unstyled flex-grow-1"></ul>
            <div id="avisoEnvioCarrito" class="mb-2"></div>
            <hr>
            <h5>Total: <span id="totalCarrito">$0</span></h5>
            <button class="btn-mandala w-100 mt-2" id="btnWhatsapp">
                Finalizar pedido por WhatsApp
            </button>
        </div>
    </div>

    <!-- Toast de confirmación -->
    <div class="toast-confirmacion" id="toastConfirmacion">
        ✓ Producto agregado al carrito
    </div>

    <footer class="footer-mandala py-4 mt-5">
        <div class="container text-center">
            <p class="mb-2">© 2026 Mandala Skincare</p>
            <a href="politicas-privacidad.html">Políticas de privacidad</a> ·
            <a href="cambios-y-devoluciones.html">Cambios y devoluciones</a> ·
            <a href="blog.html">Blog</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>

</body>
</html>
