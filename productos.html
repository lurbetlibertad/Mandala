<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Alex+Brush&display=swap" rel="stylesheet">
    <title>Productos — Mandala Skincare</title>

    <!-- Meta descripción para buscadores -->
    <meta name="description" content="Descubrí todos los productos de Mandala Skincare: sérums faciales, espumas de limpieza, emulsiones hidratantes y accesorios de skincare con ingredientes naturales.">

    <!-- Vista previa al compartir el link (WhatsApp, Instagram, Facebook, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Mandala Skincare">
    <meta property="og:title" content="Productos — Mandala Skincare">
    <meta property="og:description" content="Explorá toda la línea de productos de Mandala: cuidado facial, capilar y accesorios de skincare.">
    <meta property="og:image" content="img/logo-mandala.jpg">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS propio -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="header"></div>

    <script>
    fetch("header.html")
        .then(response => response.text())
        .then(data => {
            const contenedorHeader = document.getElementById("header");
            contenedorHeader.innerHTML = data;

            // Los <script> insertados vía innerHTML no se ejecutan solos.
            // Los volvemos a crear manualmente para que sí corran.
            contenedorHeader.querySelectorAll("script").forEach(scriptViejo => {
                const scriptNuevo = document.createElement("script");
                if (scriptViejo.src) {
                    scriptNuevo.src = scriptViejo.src;
                } else {
                    scriptNuevo.textContent = scriptViejo.textContent;
                }
                document.body.appendChild(scriptNuevo);
            });

            // El contador y el panel del carrito viven acá adentro (header.html);
            // ahora que ya existen, los actualizamos.
            if (typeof actualizarCarrito === "function") actualizarCarrito();
        });
    </script>

    <header class="py-5 text-center">
        <h1 class="titulo-bold text-dark" style="font-size: 2.5rem; font-family: 'Playfair Display', serif;">Nuestros Productos</h1>
    </header>

    <!-- Medios de pago (Hereda tus estilos de insignia) -->
    <section class="container text-center mb-4" id="medios-pago"></section>

    <!-- BARRA DE FILTROS Y BUSCADOR AVANZADO INTEGRADO -->
    <section class="container mb-5">
        <div class="row g-3 align-items-center">
            
            <div class="col-md-4">
                <div class="buscador-wrap">
                    <span class="buscador-icono"><i class="bi bi-search"></i></span>
                    <input
                        type="text"
                        id="buscadorProductos"
                        class="form-control"
                        placeholder="Buscar productos..."
                        autocomplete="off">
                    <button type="button" id="btnLimpiarBusqueda" class="buscador-limpiar">
                        <i class="bi bi-x-circle-fill"></i>
                    </button>
                    <!-- Lista de sugerencias con tu clase del CSS -->
                    <ul id="listaSugerencias" class="buscador-sugerencias"></ul>
                </div>
            </div>

            <div class="col-md-3">
                <select class="form-select rounded-pill border-secondary-subtle px-3 py-2" id="filtroCategoria">
                    <option>Todas las categorías</option>
                </select>
            </div>

            <div class="col-md-2">
                <select class="form-select rounded-pill border-secondary-subtle px-3 py-2" id="filtroMarca">
                    <option>Todas las marcas</option>
                </select>
            </div>

            <div class="col-md-3">
                <select class="form-select rounded-pill border-secondary-subtle px-3 py-2" id="ordenPrecio">
                    <option value="relevancia">Ordenar por</option>
                    <option value="menor">Precio: menor a mayor</option>
                    <option value="mayor">Precio: mayor a menor</option>
                </select>
            </div>

        </div>

        <!-- Banner dinámico de envío gratis -->
    
    </section>

    <!-- CONTENEDOR DE PRODUCTOS -->
    <section class="container py-2">

        <!-- Spinner de carga -->
        <div id="cargando-productos" class="text-center py-5">
            <div class="spinner-border" role="status" style="color: #7C8B5F;"></div>
            <p class="mt-2 text-muted">Cargando productos...</p>
        </div>

        <!-- Mensaje de no resultados (Usa tu estilo sin-resultados-busqueda) -->
        <div id="sinResultadosBusqueda" class="text-center py-5 sin-resultados-busqueda">
            <i class="bi bi-emoji-frown"></i>
            <h4>No se encontraron resultados</h4>
            <p class="sin-resultados-sugerencia">Probá escribiendo otra palabra o borrando los filtros activos.</p>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4" id="contenedor-productos">
            <!-- Las cards se inyectan automáticamente desde script.js -->
        </div>

        <!-- Paginación con tus estilos personalizados -->
        <nav class="d-flex justify-content-center mt-5">
            <ul class="pagination" id="paginacion"></ul>
        </nav>

    </section>

    <!-- MODAL DE DETALLE DE PRODUCTO -->
    <div class="modal fade" id="modalProducto" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 rounded-3 overflow-hidden shadow">
                <div class="modal-header border-0 bg-light py-3 px-4">
                    <h5 class="modal-title fw-bold" id="modalProductoNombre" style="font-family: 'Playfair Display', serif; color: #4f5d48;"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row g-4 align-items-center">
                        <div class="col-md-6">
                            <img id="modalProductoImagen" src="" alt="Producto" class="img-fluid rounded w-100 object-fit-cover" style="max-height: 350px;">
                            <img id="modalProductoImagenHover" src="" alt="Producto - vista adicional" class="img-fluid rounded w-100 object-fit-cover mt-2 d-none" style="max-height: 350px;">
                        </div>
                        <div class="col-md-6">
                            <p id="modalProductoMarca" class="text-uppercase tracking-wider small fw-bold mb-1" style="color: #be7a62;"></p>
                            <p id="modalProductoDescripcionCorta" class="fw-semibold text-dark mb-2"></p>
                            <p id="modalProductoDescripcionLarga" class="text-muted small mb-3"></p>

                            <div class="detalle-producto mb-4" id="modalProductoDetalles">
                                <div class="detalle-item" id="modalProductoTamanoWrap">
                                    <span class="detalle-label"><i class="bi bi-box-seam"></i> Presentación</span>
                                    <span id="modalProductoTamano" class="detalle-valor"></span>
                                </div>
                                <div class="detalle-item" id="modalProductoIngredientesWrap">
                                    <span class="detalle-label"><i class="bi bi-flower2"></i> Ingredientes destacados</span>
                                    <span id="modalProductoIngredientes" class="detalle-valor"></span>
                                </div>
                                <div class="detalle-item" id="modalProductoModoUsoWrap">
                                    <span class="detalle-label"><i class="bi bi-droplet"></i> Modo de uso</span>
                                    <span id="modalProductoModoUso" class="detalle-valor"></span>
                                </div>
                                <div class="detalle-item" id="modalProductoTipoPielWrap">
                                    <span class="detalle-label"><i class="bi bi-person"></i> Tipo de piel</span>
                                    <span id="modalProductoTipoPiel" class="detalle-valor"></span>
                                </div>
                            </div>

                            <div class="precio-wrap mb-4 bg-light p-3 rounded-3">
                                <span id="modalProductoPrecioAnterior" class="precio-anterior"></span>
                                <h4 id="modalProductoPrecioFinal" class="d-inline fw-bold"></h4>
                            </div>
                            <button class="btn-mandala w-100 py-2" id="modalProductoBtnComprar">Comprar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script>
    fetch("footer.html")
        .then(response => response.text())
        .then(data => {
            const contenedorFooter = document.getElementById("footer");
            contenedorFooter.innerHTML = data;

            contenedorFooter.querySelectorAll("script").forEach(scriptViejo => {
                const scriptNuevo = document.createElement("script");
                if (scriptViejo.src) {
                    scriptNuevo.src = scriptViejo.src;
                } else {
                    scriptNuevo.textContent = scriptViejo.textContent;
                }
                document.body.appendChild(scriptNuevo);
            });
        });
    </script>

    <!-- Botón flotante para volver arriba -->
    <button id="btnVolverArriba" class="btn-volver-arriba" aria-label="Volver arriba" title="Volver arriba">
        <i class="bi bi-arrow-up"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="js/script.js?v=4"></script>
</body>
</html>
